services:
  - type: web
    name: redistress-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GHL_WEBHOOK_URL
        sync: false
      - key: GHL_API_KEY
        sync: false
    healthCheckPath: /health
  - type: cron
    name: redistress-daily-scrape
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "0 9 * * *"
    startCommand: python -m jobs.runner --job daily_scrape_all
    envVars:
      - key: DATABASE_URL
        sync: false
  - type: cron
    name: redistress-daily-score
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "0 11 * * *"
    startCommand: python -m jobs.runner --job daily_score_all
    envVars:
      - key: DATABASE_URL
        sync: false
